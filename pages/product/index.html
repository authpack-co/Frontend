<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produto — AuthPack</title>
    <meta name="description" content="Detalhes do produto na vitrine AuthPack">
    <link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/styles/elementState.css">
    <link rel="stylesheet" href="/pages/product/style.css">
</head>

<body>
    <!-- Header -->
    <header class="product-header">
        <a href="/" class="logo">
            <img src="/assets/images/favicon-128x128.png" alt="AuthPack">
            <span>AuthPack</span>
        </a>
        <nav class="header-nav">
            <a href="/pages/vitrine/" class="header-link">← Vitrine</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="product-main">
        <div id="product-state" class="loading-state">
            <!-- Loading -->
            <div class="preset preset-loading">
                <div class="spinner-container">
                    <div class="spinner large"></div>
                </div>
            </div>

            <!-- Not found -->
            <div class="preset preset-empty">
                <div class="empty-container">
                    <div class="empty-icon">🔍</div>
                    <h2>Produto não encontrado</h2>
                    <p>Este produto pode ter sido removido ou está indisponível</p>
                    <a href="/pages/vitrine/" class="back-link">Voltar para a vitrine</a>
                </div>
            </div>

            <!-- Content -->
            <div class="preset preset-content">
                <div class="product-detail-layout">
                    <div class="product-detail-info">
                        <div class="product-type-badge" id="product-type-badge"></div>
                        <h1 class="product-detail-name" id="product-detail-name"></h1>
                        <p class="product-detail-desc" id="product-detail-desc"></p>

                        <div class="product-detail-sessions" id="product-detail-sessions">
                            <!-- session icons + names -->
                        </div>
                    </div>

                    <div class="product-detail-sidebar">
                        <div class="product-purchase-card">
                            <div class="purchase-price">
                                <span class="currency">R$</span>
                                <span class="price-value" id="product-detail-price"></span>
                            </div>
                            <div class="purchase-type" id="product-detail-billing"></div>
                            <button class="btn-purchase" id="btn-purchase">
                                Comprar agora
                            </button>
                            <p class="purchase-note">Pagamento seguro via Stripe</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="product-footer">
        <span>© AuthPack</span>
    </footer>

    <script src="/assets/scripts/envManager.js"></script>
    <script src="/assets/scripts/fetchManager.js"></script>
    <script src="/assets/scripts/elementState.js"></script>
    <script src="/pages/product/script.js"></script>
</body>

</html>
